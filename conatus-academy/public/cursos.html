<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos Disponíveis | Conatus Institute</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cursos-body">

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><img src="assets/img/Logo Institute.svg" alt="Conatus Institute" class="nav-logo-img"></a>
            <ul class="nav-menu">
                <li><a href="index.html#sobre">Sobre</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="login.html">Portal do Aluno</a></li>
            </ul>
        </div>
    </nav>

    <div class="cursos-header">
        <h1>Cursos Disponíveis</h1>
        <p>Capacitação técnica de alto nível para operação crítica em Data Centers.</p>
    </div>

    <div class="carousel-container">
        <button class="carousel-btn carousel-prev" onclick="move(-1)">&#10094;</button>
        <div class="carousel-wrapper">
            <div id="lista" class="carousel-track">
                <!-- Renderizado via JS -->
            </div>
        </div>
        <button class="carousel-btn carousel-next" onclick="move(1)">&#10095;</button>
    </div>
    <div class="carousel-dots" id="dots"></div>

    <script>
    let coursesData = [];
    let track;
    let idx = 0;
    let timer;

    function renderCarousel() {
        let html = "";
        const items = [...coursesData, ...coursesData, ...coursesData];
        items.forEach(curso => {
            html += `
                <div class="carousel-slide">
                    <div class="card">
                        <a href="curso-detalhes.html?id=${curso.id}" style="text-decoration: none; color: inherit;">
                            <img src="${curso.image}" alt="${curso.nome}" class="card-image" style="cursor: pointer;">
                        </a>
                        <div class="card-content">
                            <h3>${curso.nome}</h3>
                            <span class="badge">Certificação Profissional</span>
                            <p>Carga horária: <strong>${curso.duracao}</strong></p>
                            <div class="card-buttons">
                                <a href="curso-detalhes.html?id=${curso.id}" class="btn-card btn-outline">Saiba Mais</a>
                                <a href="#" class="btn-card btn-fill" onclick="event.preventDefault(); matricular(${curso.id})">Matricular-se</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('lista').innerHTML = html;
        track = document.getElementById('lista');
        idx = coursesData.length;
        slide(false);
        updateDots();

        track.addEventListener('transitionend', () => {
            const total = coursesData.length;
            if (idx >= total * 2) {
                idx -= total;
                slide(false);
            } else if (idx < total) {
                idx += total;
                slide(false);
            }
        });
    }

    function slide(animate) {
        if (!track || !track.children[0]) return;
        const w = track.children[0].offsetWidth + 25;
        track.style.transition = animate ? 'transform 0.5s ease' : 'none';
        track.style.transform = `translateX(-${idx * w}px)`;
    }

    function updateDots() {
        const dots = document.getElementById('dots');
        const total = coursesData.length;
        let html = "";
        for (let i = 0; i < total; i++) {
            const active = (idx % total) === i;
            html += `<span class="carousel-dot ${active ? 'active' : ''}" onclick="goTo(${i})"></span>`;
        }
        dots.innerHTML = html;
    }

    function move(dir) {
        idx += dir;
        slide(true);
        updateDots();
    }

    function goTo(i) {
        const total = coursesData.length;
        idx = total + i;
        slide(true);
        updateDots();
    }

    function matricular(cursoId) {
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');
        
        if (!user || !token) {
            alert("Você precisa estar logado para se matricular!");
            window.location.href = "login.html";
            return;
        }

        fetch(`/api/cursos/${cursoId}/matricular`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            }
        })
        .then(res => res.json())
        .then(data => {
            if (data.erro) {
                alert(data.erro);
                return;
            }
            alert("Matrícula realizada com sucesso!");
            if (cursoId === 1) {
                window.location.href = "cursos/geracao/curso-geracao.html";
            }
        })
        .catch(err => {
            console.error(err);
            alert("Erro ao realizar matrícula.");
        });
    }

    fetch('/cursos')
        .then(res => res.json())
        .then(data => {
            coursesData = data;
            renderCarousel();
            timer = setInterval(() => move(1), 5000);
        });
    </script>

</body>
</html>
