<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado | Conatus Institute</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #eef1f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .toolbar button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back {
            background: #ffffff;
            color: #1f2937;
            border: 1px solid #d7dce3;
        }

        .btn-back:hover { background: #f5f7fa; }

        .btn-print {
            background: #182636;
            color: #ffffff;
        }

        .btn-print:hover { background: #24384f; }

        .certificate-wrapper {
            width: 980px;
            max-width: 100%;
        }

        .certificate {
            width: 980px;
            height: 690px;
            max-width: 100%;
            position: relative;
            overflow: hidden;
            color: #ffffff;
            background:
                radial-gradient(circle at 50% 22%, rgba(255,255,255,0.08), transparent 28%),
                linear-gradient(135deg, #0f1b28 0%, #172638 42%, #0d1825 100%);
            box-shadow: 0 22px 70px rgba(15, 27, 40, 0.28);
            border: 1px solid rgba(221, 188, 118, 0.55);
        }

        .certificate::before,
        .certificate::after {
            content: "";
            position: absolute;
            top: -80px;
            width: 150px;
            height: 860px;
            z-index: 1;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.55), rgba(230,189,109,0.95) 40%, rgba(122,98,64,0.95) 64%, rgba(255,246,219,0.82));
            box-shadow: 0 0 24px rgba(236, 199, 126, 0.22);
        }

        .certificate::before {
            left: -74px;
            border-radius: 48% 52% 44% 56% / 16% 45% 55% 84%;
            transform: rotate(-4deg);
        }

        .certificate::after {
            right: -74px;
            border-radius: 52% 48% 56% 44% / 45% 16% 84% 55%;
            transform: rotate(4deg);
        }

        .gold-wave-left,
        .gold-wave-right {
            position: absolute;
            top: -90px;
            width: 115px;
            height: 880px;
            z-index: 2;
            background: #102030;
            opacity: 0.96;
        }

        .gold-wave-left {
            left: -88px;
            border-radius: 50% 50% 42% 58% / 12% 45% 55% 88%;
        }

        .gold-wave-right {
            right: -88px;
            border-radius: 50% 50% 58% 42% / 45% 12% 88% 55%;
        }

        .cert-border {
            position: absolute;
            inset: 18px;
            border: 1px solid rgba(230, 190, 112, 0.36);
            pointer-events: none;
            z-index: 3;
        }

        .cert-border-inner {
            position: absolute;
            inset: 28px;
            border: 1px solid rgba(255, 255, 255, 0.11);
            pointer-events: none;
            z-index: 3;
        }

        .cert-watermark {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.075;
            background-image:
                radial-gradient(circle at 20% 18%, transparent 0 9px, rgba(255,255,255,0.5) 10px 11px, transparent 12px),
                radial-gradient(circle at 80% 22%, transparent 0 9px, rgba(255,255,255,0.5) 10px 11px, transparent 12px),
                radial-gradient(circle at 38% 47%, transparent 0 9px, rgba(255,255,255,0.5) 10px 11px, transparent 12px),
                radial-gradient(circle at 68% 58%, transparent 0 9px, rgba(255,255,255,0.5) 10px 11px, transparent 12px),
                radial-gradient(circle at 24% 75%, transparent 0 9px, rgba(255,255,255,0.5) 10px 11px, transparent 12px);
        }

        .cert-content {
            position: absolute;
            inset: 0;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 52px 130px 44px;
            text-align: center;
        }

        .cert-institute {
            font-size: 1rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .cert-title {
            font-family: 'Playfair Display', serif;
            font-size: 4.45rem;
            line-height: 0.94;
            font-weight: 900;
            color: #f5dfb0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 0 rgba(0,0,0,0.35), 0 0 18px rgba(245, 223, 176, 0.12);
            margin-bottom: 2px;
        }

        .cert-realizacao {
            font-family: 'Playfair Display', serif;
            font-size: 1.85rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 28px;
            text-shadow: 0 2px 0 rgba(0,0,0,0.25);
        }

        .cert-intro {
            position: relative;
            font-size: 0.92rem;
            line-height: 1.5;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            max-width: 740px;
            margin-bottom: 26px;
            padding-bottom: 12px;
        }

        .cert-intro::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 310px;
            height: 1px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.92), transparent);
        }

        .cert-intro::before {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -6px;
            width: 10px;
            height: 10px;
            transform: translateX(-50%) rotate(45deg);
            border-right: 1px solid rgba(255,255,255,0.9);
            border-bottom: 1px solid rgba(255,255,255,0.9);
            background: #172638;
        }

        .cert-name {
            font-family: 'Great Vibes', cursive;
            font-size: 4.05rem;
            line-height: 1;
            color: #caa968;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 26px;
            text-shadow: 0 1px 0 rgba(0,0,0,0.35);
        }

        .cert-details {
            max-width: 670px;
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.55;
            font-weight: 500;
            margin-bottom: 26px;
        }

        .cert-course {
            display: block;
            font-weight: 800;
            color: #f4dba6;
            margin-top: 4px;
        }

        .seal-row {
            width: 100%;
            max-width: 690px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 24px;
            margin: 0 auto 18px;
        }

        .seal-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245, 223, 176, 0.88), transparent);
        }

        .cert-seal {
            width: 96px;
            height: 96px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            color: #1a2736;
            font-size: 0.62rem;
            font-weight: 900;
            line-height: 1.05;
            text-transform: uppercase;
            text-align: center;
            background:
                radial-gradient(circle at 50% 50%, #ffffff 0 34%, transparent 35%),
                conic-gradient(from 0deg, #f9e5b8 0 10deg, #c79b47 10deg 20deg, #f9e5b8 20deg 30deg, #c79b47 30deg 40deg, #f9e5b8 40deg 50deg, #c79b47 50deg 60deg, #f9e5b8 60deg 70deg, #c79b47 70deg 80deg, #f9e5b8 80deg 90deg, #c79b47 90deg 100deg, #f9e5b8 100deg 110deg, #c79b47 110deg 120deg, #f9e5b8 120deg 130deg, #c79b47 130deg 140deg, #f9e5b8 140deg 150deg, #c79b47 150deg 160deg, #f9e5b8 160deg 170deg, #c79b47 170deg 180deg, #f9e5b8 180deg 190deg, #c79b47 190deg 200deg, #f9e5b8 200deg 210deg, #c79b47 210deg 220deg, #f9e5b8 220deg 230deg, #c79b47 230deg 240deg, #f9e5b8 240deg 250deg, #c79b47 250deg 260deg, #f9e5b8 260deg 270deg, #c79b47 270deg 280deg, #f9e5b8 280deg 290deg, #c79b47 290deg 300deg, #f9e5b8 300deg 310deg, #c79b47 310deg 320deg, #f9e5b8 320deg 330deg, #c79b47 330deg 340deg, #f9e5b8 340deg 350deg, #c79b47 350deg 360deg);
            box-shadow: 0 0 0 5px rgba(255,255,255,0.72), 0 12px 24px rgba(0,0,0,0.25);
        }

        .cert-footer {
            width: 100%;
            max-width: 690px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 150px;
            align-items: end;
            margin-top: 4px;
        }

        .cert-signature {
            text-align: center;
            min-height: 54px;
        }

        .signature-line {
            border-top: 1px solid rgba(245, 223, 176, 0.9);
            padding-top: 9px;
            margin-bottom: 3px;
        }

        .signature-name {
            font-family: 'Great Vibes', cursive;
            font-size: 1.65rem;
            line-height: 1;
            color: #f5dfb0;
        }

        .signature-role {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .cert-code {
            position: absolute;
            bottom: 24px;
            right: 42px;
            z-index: 5;
            font-size: 0.68rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        .cert-date-text {
            font-family: 'Great Vibes', cursive;
            font-size: 1.65rem;
            line-height: 1;
            color: #f5dfb0;
        }

        .not-eligible {
            background: white;
            padding: 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
        }

        .not-eligible h2 {
            color: #e53e3e;
            margin-bottom: 12px;
        }

        .not-eligible p {
            color: #666;
            line-height: 1.6;
        }

        @media (max-width: 1020px) {
            .certificate-wrapper { overflow-x: auto; }
            .certificate { min-width: 980px; }
        }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body {
                background: white;
                padding: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .toolbar { display: none !important; }
            .certificate-wrapper { width: 100%; box-shadow: none; }
            .certificate {
                width: 100vw;
                height: 100vh;
                box-shadow: none;
                border: none;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="window.location.href='dashboard.html'">Voltar ao Dashboard</button>
        <button class="btn-print" onclick="window.print()">Imprimir / Salvar PDF</button>
    </div>

    <div class="certificate-wrapper" id="cert-container">
        <div style="text-align:center; padding:60px; color:#888;">Carregando certificado...</div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');
        const params = new URLSearchParams(window.location.search);
        const cursoId = params.get('curso_id');

        if (!user || !token || !cursoId) {
            window.location.href = '../auth/login.html';
        } else {
            carregarCertificado();
        }

        async function carregarCertificado() {
            const container = document.getElementById('cert-container');

            try {
                const res = await fetch(`/api/cursos/${cursoId}/certificado`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    container.innerHTML = `
                        <div class="not-eligible">
                            <h2>Erro</h2>
                            <p>${data.erro}</p>
                        </div>`;
                    return;
                }

                if (data.emitido) {
                    renderizarCertificado(data.certificado);
                } else {
                    const elegivel = await verificarElegibilidade();
                    if (elegivel.podeGerar) {
                        await gerarCertificado(elegivel.nota);
                    } else {
                        container.innerHTML = `
                            <div class="not-eligible">
                                <h2>Certificado Indisponível</h2>
                                <p>${elegivel.motivo}</p>
                            </div>`;
                    }
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="not-eligible">
                        <h2>Erro</h2>
                        <p>Não foi possível carregar o certificado. Tente novamente.</p>
                    </div>`;
            }
        }

        async function verificarElegibilidade() {
            const matRes = await fetch('/api/cursos/aluno/matriculas', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const matData = await matRes.json();
            const matricula = (matData.matriculas || []).find(m => String(m.curso_id) === String(cursoId));

            if (!matricula) {
                return { podeGerar: false, motivo: 'Você não está matriculado neste curso.' };
            }

            if (matricula.progresso < 100) {
                return { podeGerar: false, motivo: `Progresso do curso: ${matricula.progresso}%. Complete 100% das aulas para emitir o certificado.` };
            }

            let quiz = null;
            const quizKeys = [
                `curso-geracao-quiz-${user.id}`,
                `curso-geracao-quiz`
            ];
            for (const key of quizKeys) {
                const raw = localStorage.getItem(key);
                if (raw) {
                    quiz = JSON.parse(raw);
                    break;
                }
            }

            if (!quiz) {
                return { podeGerar: false, motivo: 'Você ainda não realizou a avaliação do curso. Volte ao curso e clique em "Iniciar Avaliação".' };
            }

            if (!quiz.quizCompleted) {
                return { podeGerar: false, motivo: 'A avaliação ainda não foi finalizada. Complete a avaliação com pelo menos 70% de acerto.' };
            }

            if (quiz.lastScore < 70) {
                return { podeGerar: false, motivo: `Sua nota na avaliação foi ${quiz.lastScore}%. É necessário pelo menos 70% de acerto. Tente novamente.` };
            }

            return { podeGerar: true, nota: quiz.lastScore };
        }

        async function gerarCertificado(nota) {
            const container = document.getElementById('cert-container');
            try {
                const res = await fetch(`/api/cursos/${cursoId}/certificado`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nota })
                });
                const data = await res.json();

                if (data.certificado) {
                    renderizarCertificado(data.certificado);
                } else {
                    container.innerHTML = `
                        <div class="not-eligible">
                            <h2>Erro</h2>
                            <p>${data.erro || 'Não foi possível gerar o certificado.'}</p>
                        </div>`;
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="not-eligible">
                        <h2>Erro</h2>
                        <p>Não foi possível gerar o certificado. Tente novamente.</p>
                    </div>`;
            }
        }

        function renderizarCertificado(cert) {
            const container = document.getElementById('cert-container');
            const dataFormatada = new Date(cert.data_emissao).toLocaleDateString('pt-BR', {
                day: '2-digit', month: 'long', year: 'numeric'
            });

            container.innerHTML = `
                <div class="certificate">
                    <div class="gold-wave-left"></div>
                    <div class="gold-wave-right"></div>
                    <div class="cert-watermark"></div>
                    <div class="cert-border"></div>
                    <div class="cert-border-inner"></div>

                    <div class="cert-content">
                        <div class="cert-institute">Conatus Institute</div>
                        <div class="cert-title">Certificado</div>
                        <div class="cert-realizacao">â€” De Realização â€”</div>

                        <div class="cert-intro">Este certificado orgulha-se de emitir para</div>

                        <div class="cert-name">${user.nome}</div>

                        <div class="cert-details">
                            Pela conclusão com êxito do curso
                            <span class="cert-course">Introdução a Sistemas de Geração para Data Centers</span>
                            Carga horária: 20 horas â€¢ Nota na avaliação: ${cert.nota_avaliacao}%
                        </div>

                        <div class="seal-row">
                            <div class="seal-line"></div>
                            <div class="cert-seal">Certificado<br>Conatus<br>Institute</div>
                            <div class="seal-line"></div>
                        </div>

                        <div class="cert-footer">
                            <div class="cert-signature">
                                <div class="signature-line"></div>
                                <div class="cert-date-text">${dataFormatada}</div>
                                <div class="signature-role">Data</div>
                            </div>
                            <div class="cert-signature">
                                <div class="signature-line"></div>
                                <div class="signature-name">Conatus Institute</div>
                                <div class="signature-role">Instituição Certificadora</div>
                            </div>
                        </div>
                    </div>

                    <div class="cert-code">Código: ${cert.codigo}</div>
                </div>`;
        }
    </script>
</body>
</html>
