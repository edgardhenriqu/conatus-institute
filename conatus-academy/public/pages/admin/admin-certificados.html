<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Certificados | Conatus Institute</title>
    <link rel="stylesheet" href="../../css/global.css?v=20260602195731">
    <style>
        .admin-body {
            background: var(--bg-light);
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 2rem;
            color: var(--primary);
        }
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filters input, .filters select {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
        }
        .filters button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .certificados-table {
            width: 100%;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .certificados-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .certificados-table th,
        .certificados-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .certificados-table th {
            background: var(--primary);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .certificados-table tr:hover {
            background: var(--bg-light);
        }
        .certificados-table tr:last-child td {
            border-bottom: none;
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
        .btn-view, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .btn-view {
            background: var(--primary);
            color: white;
        }
        .btn-delete {
            background: var(--secondary);
            color: white;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: var(--border);
            color: var(--text-main);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .cert-detail {
            margin-bottom: 15px;
        }
        .cert-detail strong {
            color: var(--primary);
        }
        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 15px; }
            .filters { width: 100%; }
            .certificados-table { overflow-x: auto; }
        }
    </style>
</head>
<body class="admin-body">

    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard-admin.html" class="nav-logo"><img src="../../assets/img/Logo Institute.svg" alt="Conatus Institute" class="nav-logo-img"></a>
            <ul class="nav-menu">
                <li><a href="dashboard-admin.html">Dashboard</a></li>
                <li><a href="admin-alunos.html">Alunos</a></li>
                <li><a href="admin-cursos.html">Cursos</a></li>
                <li><a href="admin-certificados.html" class="active">Certificados</a></li>
            </ul>
            <div class="nav-actions">
                <span id="admin-name" style="color: var(--text-muted); font-size: 0.9rem;"></span>
                <a href="../../index.html" style="color: var(--secondary);" onclick="logout()">Sair</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="page-header">
            <h1>Gerenciar Certificados</h1>
            <div class="filters">
                <input type="text" id="buscaAluno" placeholder="Buscar por aluno...">
                <select id="filtroCurso">
                    <option value="">Todos os cursos</option>
                </select>
                <input type="date" id="dataInicio" placeholder="Data início">
                <input type="date" id="dataFim" placeholder="Data fim">
                <button onclick="buscarCertificados()">Filtrar</button>
            </div>
        </div>

        <div class="certificados-table">
            <table>
                <thead>
                    <tr>
                        <th>Aluno</th>
                        <th>Curso</th>
                        <th>Nota</th>
                        <th>Código</th>
                        <th>Data de Emissão</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="certificados-lista">
                    <tr>
                        <td colspan="6" class="empty-state">Carregando certificados...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal de Visualização -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal">
            <h2>Detalhes do Certificado</h2>
            <div id="cert-detalhes"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeViewModal()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        if (!user || !token || user.role !== 'admin') {
            window.location = "../auth/login.html";
        } else {
            document.getElementById('admin-name').textContent = user.nome;
            carregarCursosFiltro();
            carregarCertificados();
        }

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
        }

        async function carregarCursosFiltro() {
            try {
                const res = await fetch('/api/admin/cursos', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.cursos) {
                    const select = document.getElementById('filtroCurso');
                    data.cursos.forEach(curso => {
                        const option = document.createElement('option');
                        option.value = curso.id;
                        option.textContent = curso.nome;
                        select.appendChild(option);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function carregarCertificados(filtros = {}) {
            try {
                let url = '/api/admin/certificados';
                const params = new URLSearchParams();

                if (filtros.aluno) params.append('aluno_id', filtros.aluno);
                if (filtros.curso) params.append('curso_id', filtros.curso);
                if (filtros.dataInicio) params.append('data_inicio', filtros.dataInicio);
                if (filtros.dataFim) params.append('data_fim', filtros.dataFim);

                if (params.toString()) url += `?${params.toString()}`;

                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                const tbody = document.getElementById('certificados-lista');
                if (data.certificados.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nenhum certificado encontrado.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.certificados.map(cert => `
                    <tr>
                        <td>${cert.aluno_nome}</td>
                        <td>${cert.curso_nome}</td>
                        <td>${cert.nota_avaliacao}%</td>
                        <td><code>${cert.codigo}</code></td>
                        <td>${new Date(cert.data_emissao).toLocaleDateString('pt-BR')}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-view" onclick="verCertificado('${cert.id}')">Ver</button>
                                <button class="btn-delete" onclick="excluirCertificado('${cert.id}')">Excluir</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar certificados.');
            }
        }

        async function buscarCertificados() {
            const buscaAluno = document.getElementById('buscaAluno').value;
            const cursoId = document.getElementById('filtroCurso').value;
            const dataInicio = document.getElementById('dataInicio').value;
            const dataFim = document.getElementById('dataFim').value;

            const filtros = {};
            if (buscaAluno) filtros.aluno = buscaAluno;
            if (cursoId) filtros.curso = cursoId;
            if (dataInicio) filtros.dataInicio = dataInicio;
            if (dataFim) filtros.dataFim = dataFim;

            carregarCertificados(filtros);
        }

        async function verCertificado(id) {
            try {
                const res = await fetch('/api/admin/certificados', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                const cert = data.certificados.find(c => c.id === id);
                if (!cert) {
                    alert('Certificado não encontrado.');
                    return;
                }

                const detalhes = document.getElementById('cert-detalhes');
                detalhes.innerHTML = `
                    <div class="cert-detail">
                        <strong>Aluno:</strong> ${cert.aluno_nome}
                    </div>
                    <div class="cert-detail">
                        <strong>Email:</strong> ${cert.aluno_email}
                    </div>
                    <div class="cert-detail">
                        <strong>Curso:</strong> ${cert.curso_nome}
                    </div>
                    <div class="cert-detail">
                        <strong>Duração:</strong> ${cert.curso_duracao}
                    </div>
                    <div class="cert-detail">
                        <strong>Nota na Avaliação:</strong> ${cert.nota_avaliacao}%
                    </div>
                    <div class="cert-detail">
                        <strong>Código de Verificação:</strong> <code style="background: var(--bg-light); padding: 4px 8px; border-radius: 4px;">${cert.codigo}</code>
                    </div>
                    <div class="cert-detail">
                        <strong>Data de Emissão:</strong> ${new Date(cert.data_emissao).toLocaleDateString('pt-BR')}
                    </div>
                `;

                document.getElementById('viewModal').classList.add('active');
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar detalhes do certificado.');
            }
        }

        async function excluirCertificado(id) {
            if (!confirm('Tem certeza que deseja excluir este certificado? Esta ação não pode ser desfeita.')) {
                return;
            }

            try {
                const res = await fetch(`/api/admin/certificados/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                alert('Certificado excluído com sucesso!');
                carregarCertificados();
            } catch (err) {
                console.error(err);
                alert('Erro ao excluir certificado.');
            }
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }
    </script>

</body>
</html>
