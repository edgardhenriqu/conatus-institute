<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Alunos | Conatus Institute</title>
    <link rel="stylesheet" href="../../css/global.css?v=20260602195731">
    <style>
        .admin-body {
            background: var(--bg-light);
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 2rem;
            color: var(--primary);
        }
        .search-bar {
            display: flex;
            gap: 10px;
        }
        .search-bar input {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            width: 300px;
        }
        .search-bar button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .search-bar button:hover {
            background: var(--primary-light);
        }
        .alunos-table {
            width: 100%;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .alunos-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .alunos-table th,
        .alunos-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .alunos-table th {
            background: var(--primary);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .alunos-table tr:hover {
            background: var(--bg-light);
        }
        .alunos-table tr:last-child td {
            border-bottom: none;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-ativo {
            background: #d4edda;
            color: #155724;
        }
        .status-inativo {
            background: #f8d7da;
            color: #721c24;
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
        .btn-edit, .btn-view, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .btn-edit {
            background: var(--gold);
            color: var(--primary);
        }
        .btn-view {
            background: var(--primary);
            color: white;
        }
        .btn-delete {
            background: var(--secondary);
            color: white;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }
        .modal label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text-main);
        }
        .modal input, .modal select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-save {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: var(--border);
            color: var(--text-main);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 15px; }
            .search-bar input { width: 100%; }
            .alunos-table { overflow-x: auto; }
        }
    </style>
</head>
<body class="admin-body">

    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard-admin.html" class="nav-logo"><img src="../../assets/img/Logo Institute.svg" alt="Conatus Institute" class="nav-logo-img"></a>
            <ul class="nav-menu">
                <li><a href="dashboard-admin.html">Dashboard</a></li>
                <li><a href="admin-alunos.html" class="active">Alunos</a></li>
                <li><a href="admin-cursos.html">Cursos</a></li>
                <li><a href="admin-certificados.html">Certificados</a></li>
            </ul>
            <div class="nav-actions">
                <span id="admin-name" style="color: var(--text-muted); font-size: 0.9rem;"></span>
                <a href="../../index.html" style="color: var(--secondary);" onclick="logout()">Sair</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="page-header">
            <h1>Gerenciar Alunos</h1>
            <div class="search-bar">
                <input type="text" id="busca" placeholder="Buscar por nome ou email..." onkeyup="buscarAlunos()">
                <button onclick="buscarAlunos()">Buscar</button>
            </div>
        </div>

        <div class="alunos-table">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>CPF</th>
                        <th>Cidade/UF</th>
                        <th>Matrículas</th>
                        <th>Certificados</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="alunos-lista">
                    <tr>
                        <td colspan="8" class="empty-state">Carregando alunos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>Editar Aluno</h2>
            <input type="hidden" id="editId">
            <label>Nome</label>
            <input type="text" id="editNome">
            <label>Email</label>
            <input type="email" id="editEmail">
            <label>Telefone</label>
            <input type="text" id="editTelefone">
            <label>Cidade</label>
            <input type="text" id="editCidade">
            <label>Estado</label>
            <input type="text" id="editEstado" maxlength="2">
            <label>Status</label>
            <select id="editAtivo">
                <option value="true">Ativo</option>
                <option value="false">Inativo</option>
            </select>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-save" onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Visualização -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal">
            <h2>Detalhes do Aluno</h2>
            <div id="aluno-detalhes"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeViewModal()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        if (!user || !token || user.role !== 'admin') {
            window.location = "../auth/login.html";
        } else {
            document.getElementById('admin-name').textContent = user.nome;
            carregarAlunos();
        }

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
        }

        async function carregarAlunos(busca = '') {
            try {
                let url = '/api/admin/alunos';
                if (busca) url += `?busca=${encodeURIComponent(busca)}`;

                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                const tbody = document.getElementById('alunos-lista');
                if (data.alunos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Nenhum aluno encontrado.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.alunos.map(aluno => `
                    <tr>
                        <td>${aluno.nome}</td>
                        <td>${aluno.email}</td>
                        <td>${aluno.cpf}</td>
                        <td>${aluno.cidade || '-'}${aluno.estado ? '/' + aluno.estado : ''}</td>
                        <td>${aluno.total_matriculas}</td>
                        <td>${aluno.total_certificados}</td>
                        <td><span class="status-badge ${aluno.ativo ? 'status-ativo' : 'status-inativo'}">${aluno.ativo ? 'Ativo' : 'Inativo'}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-view" onclick="verAluno('${aluno.id}')">Ver</button>
                                <button class="btn-edit" onclick="editarAluno('${aluno.id}')">Editar</button>
                                <button class="btn-delete" onclick="excluirAluno('${aluno.id}')">Excluir</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar alunos.');
            }
        }

        function buscarAlunos() {
            const busca = document.getElementById('busca').value;
            carregarAlunos(busca);
        }

        async function verAluno(id) {
            try {
                const res = await fetch(`/api/admin/alunos/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                const detalhes = document.getElementById('aluno-detalhes');
                detalhes.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <h3 style="color: var(--primary); margin-bottom: 10px;">Dados Pessoais</h3>
                        <p><strong>Nome:</strong> ${data.aluno.nome}</p>
                        <p><strong>Email:</strong> ${data.aluno.email}</p>
                        <p><strong>CPF:</strong> ${data.aluno.cpf}</p>
                        <p><strong>Data de Nascimento:</strong> ${new Date(data.aluno.data_nascimento).toLocaleDateString('pt-BR')}</p>
                        <p><strong>Telefone:</strong> ${data.aluno.telefone || '-'}</p>
                        <p><strong>Endereço:</strong> ${data.aluno.endereco || '-'}</p>
                        <p><strong>Cidade:</strong> ${data.aluno.cidade || '-'}${data.aluno.estado ? '/' + data.aluno.estado : ''}</p>
                        <p><strong>Status:</strong> <span class="status-badge ${data.aluno.ativo ? 'status-ativo' : 'status-inativo'}">${data.aluno.ativo ? 'Ativo' : 'Inativo'}</span></p>
                        <p><strong>Cadastro:</strong> ${new Date(data.aluno.created_at).toLocaleDateString('pt-BR')}</p>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <h3 style="color: var(--primary); margin-bottom: 10px;">Matrículas (${data.matriculas.length})</h3>
                        ${data.matriculas.length === 0 ? '<p style="color: var(--text-muted);">Nenhuma matrícula.</p>' :
                        data.matriculas.map(m => `
                            <div style="padding: 10px; background: var(--bg-light); border-radius: 4px; margin-bottom: 10px;">
                                <p><strong>${m.curso_nome}</strong> - ${m.duracao}</p>
                                <p>Progresso: ${m.progresso}% | Status: ${m.status}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div>
                        <h3 style="color: var(--primary); margin-bottom: 10px;">Certificados (${data.certificados.length})</h3>
                        ${data.certificados.length === 0 ? '<p style="color: var(--text-muted);">Nenhum certificado emitido.</p>' :
                        data.certificados.map(c => `
                            <div style="padding: 10px; background: var(--bg-light); border-radius: 4px; margin-bottom: 10px;">
                                <p><strong>${c.curso_nome}</strong></p>
                                <p>Código: ${c.codigo} | Nota: ${c.nota_avaliacao}% | Data: ${new Date(c.data_emissao).toLocaleDateString('pt-BR')}</p>
                            </div>
                        `).join('')}
                    </div>
                `;

                document.getElementById('viewModal').classList.add('active');
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar detalhes do aluno.');
            }
        }

        async function editarAluno(id) {
            try {
                const res = await fetch(`/api/admin/alunos/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                document.getElementById('editId').value = data.aluno.id;
                document.getElementById('editNome').value = data.aluno.nome;
                document.getElementById('editEmail').value = data.aluno.email;
                document.getElementById('editTelefone').value = data.aluno.telefone || '';
                document.getElementById('editCidade').value = data.aluno.cidade || '';
                document.getElementById('editEstado').value = data.aluno.estado || '';
                document.getElementById('editAtivo').value = data.aluno.ativo.toString();

                document.getElementById('editModal').classList.add('active');
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar dados do aluno.');
            }
        }

        async function salvarEdicao() {
            const id = document.getElementById('editId').value;
            const dados = {
                nome: document.getElementById('editNome').value,
                email: document.getElementById('editEmail').value,
                telefone: document.getElementById('editTelefone').value,
                cidade: document.getElementById('editCidade').value,
                estado: document.getElementById('editEstado').value,
                ativo: document.getElementById('editAtivo').value === 'true'
            };

            try {
                const res = await fetch(`/api/admin/alunos/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(dados)
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                alert('Aluno atualizado com sucesso!');
                closeModal();
                carregarAlunos();
            } catch (err) {
                console.error(err);
                alert('Erro ao atualizar aluno.');
            }
        }

        async function excluirAluno(id) {
            if (!confirm('Tem certeza que deseja excluir este aluno? Esta ação não pode ser desfeita.')) {
                return;
            }

            try {
                const res = await fetch(`/api/admin/alunos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                alert('Aluno excluído com sucesso!');
                carregarAlunos();
            } catch (err) {
                console.error(err);
                alert('Erro ao excluir aluno.');
            }
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }
    </script>

</body>
</html>
