<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Cursos | Conatus Institute</title>
    <link rel="stylesheet" href="../../css/global.css?v=20260602195731">
    <style>
        .admin-body {
            background: var(--bg-light);
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 2rem;
            color: var(--primary);
        }
        .btn-add {
            padding: 12px 24px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
        }
        .btn-add:hover {
            background: #a00000;
        }
        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .curso-card {
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .curso-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .curso-card-content {
            padding: 20px;
        }
        .curso-card h3 {
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 1.2rem;
        }
        .curso-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .curso-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .curso-card-meta span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .curso-card-actions {
            display: flex;
            gap: 10px;
        }
        .btn-edit, .btn-delete {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .btn-edit {
            background: var(--gold);
            color: var(--primary);
        }
        .btn-delete {
            background: var(--secondary);
            color: white;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }
        .modal label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text-main);
        }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-save {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: var(--border);
            color: var(--text-main);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 15px; }
            .cursos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="admin-body">

    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard-admin.html" class="nav-logo"><img src="../../assets/img/Logo Institute.svg" alt="Conatus Institute" class="nav-logo-img"></a>
            <ul class="nav-menu">
                <li><a href="dashboard-admin.html">Dashboard</a></li>
                <li><a href="admin-alunos.html">Alunos</a></li>
                <li><a href="admin-cursos.html" class="active">Cursos</a></li>
                <li><a href="admin-certificados.html">Certificados</a></li>
            </ul>
            <div class="nav-actions">
                <span id="admin-name" style="color: var(--text-muted); font-size: 0.9rem;"></span>
                <a href="../../index.html" style="color: var(--secondary);" onclick="logout()">Sair</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="page-header">
            <h1>Gerenciar Cursos</h1>
            <button class="btn-add" onclick="abrirModalNovo()">+ Novo Curso</button>
        </div>

        <div class="cursos-grid" id="cursos-lista">
            <div class="empty-state">Carregando cursos...</div>
        </div>
    </div>

    <!-- Modal de Curso -->
    <div class="modal-overlay" id="cursoModal">
        <div class="modal">
            <h2 id="modalTitle">Novo Curso</h2>
            <input type="hidden" id="cursoId">
            <label>Nome *</label>
            <input type="text" id="cursoNome" placeholder="Nome do curso">
            <label>Duração *</label>
            <input type="text" id="cursoDuracao" placeholder="Ex: 20h">
            <label>URL da Imagem</label>
            <input type="text" id="cursoImage" placeholder="Caminho da imagem">
            <label>Descrição</label>
            <textarea id="cursoDescricao" placeholder="Descrição do curso"></textarea>
            <label>O que vai aprender</label>
            <textarea id="cursoAprender" placeholder="O que o aluno vai aprender"></textarea>
            <label>Mercado de Trabalho</label>
            <textarea id="cursoMercado" placeholder="Oportunidades no mercado"></textarea>
            <label>Ñreas de Atuação</label>
            <textarea id="cursoAreas" placeholder="Ñreas de atuação"></textarea>
            <label>Diferenciais</label>
            <textarea id="cursoDiferenciais" placeholder="Diferenciais do curso"></textarea>
            <label>Infraestrutura</label>
            <textarea id="cursoInfra" placeholder="Infraestrutura disponível"></textarea>
            <label>Coordenação</label>
            <textarea id="cursoCoordenacao" placeholder="Informações do coordenador"></textarea>
            <label>Informações Complementares</label>
            <textarea id="cursoInfo" placeholder="Informações adicionais"></textarea>
            <label>Matriz Curricular</label>
            <textarea id="cursoMatriz" placeholder="Módulos e disciplinas"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-save" onclick="salvarCurso()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        if (!user || !token || user.role !== 'admin') {
            window.location = "../auth/login.html";
        } else {
            document.getElementById('admin-name').textContent = user.nome;
            carregarCursos();
        }

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
        }

        async function carregarCursos() {
            try {
                const res = await fetch('/api/admin/cursos', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                const container = document.getElementById('cursos-lista');
                if (data.cursos.length === 0) {
                    container.innerHTML = '<div class="empty-state">Nenhum curso cadastrado.</div>';
                    return;
                }

                container.innerHTML = data.cursos.map(curso => `
                    <div class="curso-card">
                        <img src="/${curso.image ? encodeURI(curso.image) : 'assets/img/datacenter-hero.png'}" alt="${curso.nome}" onerror="this.src='assets/img/datacenter-hero.png'">
                        <div class="curso-card-content">
                            <h3>${curso.nome}</h3>
                            <div class="curso-card-meta">
                                <span>Duração: ${curso.duracao}</span>
                                <span>Matrículas: ${curso.total_matriculas}</span>
                            </div>
                            <p>${(curso.descricao || '').substring(0, 100)}...</p>
                            <div class="curso-card-actions">
                                <button class="btn-edit" onclick="editarCurso(${curso.id})">Editar</button>
                                <button class="btn-delete" onclick="excluirCurso(${curso.id})">Excluir</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar cursos.');
            }
        }

        function abrirModalNovo() {
            document.getElementById('modalTitle').textContent = 'Novo Curso';
            document.getElementById('cursoId').value = '';
            document.getElementById('cursoNome').value = '';
            document.getElementById('cursoDuracao').value = '';
            document.getElementById('cursoImage').value = '';
            document.getElementById('cursoDescricao').value = '';
            document.getElementById('cursoAprender').value = '';
            document.getElementById('cursoMercado').value = '';
            document.getElementById('cursoAreas').value = '';
            document.getElementById('cursoDiferenciais').value = '';
            document.getElementById('cursoInfra').value = '';
            document.getElementById('cursoCoordenacao').value = '';
            document.getElementById('cursoInfo').value = '';
            document.getElementById('cursoMatriz').value = '';
            document.getElementById('cursoModal').classList.add('active');
        }

        async function editarCurso(id) {
            try {
                const res = await fetch(`/api/admin/cursos/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                document.getElementById('modalTitle').textContent = 'Editar Curso';
                document.getElementById('cursoId').value = data.curso.id;
                document.getElementById('cursoNome').value = data.curso.nome;
                document.getElementById('cursoDuracao').value = data.curso.duracao;
                document.getElementById('cursoImage').value = data.curso.image || '';
                document.getElementById('cursoDescricao').value = data.curso.descricao || '';
                document.getElementById('cursoAprender').value = data.curso.oque_aprender || '';
                document.getElementById('cursoMercado').value = data.curso.mercado_trabalho || '';
                document.getElementById('cursoAreas').value = data.curso.areas_atuacao || '';
                document.getElementById('cursoDiferenciais').value = data.curso.diferenciais || '';
                document.getElementById('cursoInfra').value = data.curso.infraestrutura || '';
                document.getElementById('cursoCoordenacao').value = data.curso.coordenacao || '';
                document.getElementById('cursoInfo').value = data.curso.informacoes_complementares || '';
                document.getElementById('cursoMatriz').value = data.curso.matriz_curricular || '';
                document.getElementById('cursoModal').classList.add('active');
            } catch (err) {
                console.error(err);
                alert('Erro ao carregar dados do curso.');
            }
        }

        async function salvarCurso() {
            const id = document.getElementById('cursoId').value;
            const dados = {
                nome: document.getElementById('cursoNome').value,
                duracao: document.getElementById('cursoDuracao').value,
                image: document.getElementById('cursoImage').value,
                descricao: document.getElementById('cursoDescricao').value,
                oque_aprender: document.getElementById('cursoAprender').value,
                mercado_trabalho: document.getElementById('cursoMercado').value,
                areas_atuacao: document.getElementById('cursoAreas').value,
                diferenciais: document.getElementById('cursoDiferenciais').value,
                infraestrutura: document.getElementById('cursoInfra').value,
                coordenacao: document.getElementById('cursoCoordenacao').value,
                informacoes_complementares: document.getElementById('cursoInfo').value,
                matriz_curricular: document.getElementById('cursoMatriz').value
            };

            if (!dados.nome || !dados.duracao) {
                alert('Preencha os campos obrigatórios (Nome e Duração).');
                return;
            }

            try {
                const url = id ? `/api/admin/cursos/${id}` : '/api/admin/cursos';
                const method = id ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(dados)
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                alert(id ? 'Curso atualizado com sucesso!' : 'Curso criado com sucesso!');
                closeModal();
                carregarCursos();
            } catch (err) {
                console.error(err);
                alert('Erro ao salvar curso.');
            }
        }

        async function excluirCurso(id) {
            if (!confirm('Tem certeza que deseja excluir este curso? Esta ação não pode ser desfeita.')) {
                return;
            }

            try {
                const res = await fetch(`/api/admin/cursos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.erro) {
                    alert(data.erro);
                    return;
                }

                alert('Curso excluído com sucesso!');
                carregarCursos();
            } catch (err) {
                console.error(err);
                alert('Erro ao excluir curso.');
            }
        }

        function closeModal() {
            document.getElementById('cursoModal').classList.remove('active');
        }
    </script>

</body>
</html>
