<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icone.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Página é 100% em português. A tradução automática do navegador (Google
         Tradutor) reescreve os nós de texto do DOM e faz o React quebrar com
         "Failed to execute 'insertBefore' on 'Node'". Declarar o idioma correto
         e desativar a tradução evita esse crash. -->
    <meta name="google" content="notranslate" />
    <title>Conatus Institute</title>
    <!-- Aplica o tema antes do React montar: sem isto o site pisca branco por um
         frame antes do modo escuro entrar. Mesma lógica do ThemeContext. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('conatus-theme');
          var theme = (saved === 'light' || saved === 'dark')
            ? saved
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) { /* sem localStorage: fica no tema claro */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
