version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: conatus_db
    environment:
      POSTGRES_DB: conatus_db
      POSTGRES_USER: conatus_user
      POSTGRES_PASSWORD: conatus_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conatus_user -d conatus_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
