version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: conatus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: conatus_db
      POSTGRES_USER: conatus_user
      POSTGRES_PASSWORD: conatus_password
      LANG: pt_BR.UTF-8
      LC_ALL: pt_BR.UTF-8
    command: postgres -c client_encoding=UTF8 -c default_text_search_config=portuguese
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conatus_user -d conatus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
